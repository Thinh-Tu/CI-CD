name: CI/CD to Docker Hub

# 1. Kích hoạt khi có sự kiện push vào nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 2: Checkout code từ GitHub về máy ảo của Action
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 3: Đăng nhập vào Docker Hub sử dụng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Thiết lập Docker Buildx (giúp build nhanh và tối ưu hơn)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 5: Build Image và Push lên Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'username/repo' bằng tên thật của bạn trên Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/my-app:latest
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="thinhhtuu/my-app"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
      
